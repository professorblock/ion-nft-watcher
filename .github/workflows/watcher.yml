name: ION NFT Watcher

# Runs the burn watcher every 5 minutes. Each run is short (~10–30 sec)
# so the monthly Actions budget (2,000 min on free tier) is plenty.
on:
  schedule:
    - cron: "*/5 * * * *"
  # Manual trigger from the Actions tab — useful for testing.
  workflow_dispatch:
    inputs:
      mode:
        description: "Override watcher mode (log or live)"
        required: false
        default: "log"
        type: choice
        options:
          - log
          - live

# We commit state back to the repo, so contents:write is required.
permissions:
  contents: write

# Don't run two ticks in parallel — that would race on state files.
concurrency:
  group: ion-nft-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run watcher tick
        env:
          # Public, non-secret addresses — fine to commit.
          PLATFORM_TREASURY_ADDRESS: ${{ vars.PLATFORM_TREASURY_ADDRESS }}
          PLATFORM_MINT_KEY_ADDRESS: ${{ vars.PLATFORM_MINT_KEY_ADDRESS }}

          # Mode — defaults to "log" (read-only). Switched to "live" via
          # the workflow_dispatch input or by setting the WATCHER_MODE
          # repository variable.
          WATCHER_MODE: ${{ github.event.inputs.mode || vars.WATCHER_MODE || 'log' }}

          # Secret — only needed in live mode. Empty in log mode is fine.
          MINT_KEY_MNEMONIC: ${{ secrets.MINT_KEY_MNEMONIC }}
        run: npm run watch

      - name: Commit state changes
        run: |
          git config user.name "ion-nft-watcher[bot]"
          git config user.email "ion-nft-watcher@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes this tick."
          else
            git commit -m "watcher: state update [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
          fi
